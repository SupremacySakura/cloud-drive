name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1: Frontend - Lint, TypeCheck, Test, Build
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '9.15.4'

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm --filter cloud-drive-frontend test:run

      - name: Build frontend
        run: pnpm --filter cloud-drive-frontend build

  # Job 2: Backend - Vet, Build, Test
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cloud-drive-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: apps/cloud-drive-backend/go.sum

      - name: Run go vet
        run: go vet ./...

      - name: Build backend
        run: go build ./...

      - name: Run tests
        run: go test ./...

  # Job 3: Docker - Validate compose configuration
  docker:
    name: Docker Config Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup Docker Compose
        run: |
          # 安装 Docker Compose v2
          DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
          mkdir -p $DOCKER_CONFIG/cli-plugins
          curl -SL https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64 -o $DOCKER_CONFIG/cli-plugins/docker-compose
          chmod +x $DOCKER_CONFIG/cli-plugins/docker-compose
          docker compose version

      - name: Validate Docker Compose
        run: |
          docker compose config
          docker compose config --profile infra
          docker compose config --profile backend
          docker compose config --profile full

  # Job 4: Deploy - SSH to server and pull code + restart services
  deploy:
    name: Deploy to Production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency: deploy-production
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DEPLOY_DIR
          script: |
            set -e

            echo "Deploying to: $DEPLOY_DIR"

            # 1. 检查 .env 文件是否存在
            if [ ! -f "$DEPLOY_DIR/.env" ]; then
              echo "ERROR: .env file not found in $DEPLOY_DIR"
              ls -la "$DEPLOY_DIR" || echo "Directory does not exist or is not accessible"
              exit 1
            fi

            # 2. 进入部署目录并拉取代码
            cd "$DEPLOY_DIR"
            git pull origin main

            # 3. 重启 Docker 服务
            docker compose --profile full up -d --build --force-recreate

            sleep 30

            echo "Checking backend health..."
            if ! docker compose exec -T backend wget -q -O - http://localhost:9000/healthz > /dev/null 2>&1; then
              echo "ERROR: backend health check failed"
              docker compose logs backend --tail 50
              exit 1
            fi
            echo "Backend is healthy"

            echo "Checking frontend health..."
            if ! docker compose exec -T frontend wget -q -O - http://localhost:80 > /dev/null 2>&1; then
              echo "ERROR: frontend health check failed"
              docker compose logs frontend --tail 50
              exit 1
            fi
            echo "Frontend is healthy"

            # 7. 清理旧镜像
            docker image prune -f
        env:
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
