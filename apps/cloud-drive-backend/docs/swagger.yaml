definitions:
  dto.CreatePickUpCodeReq:
    properties:
      code:
        type: string
      expire_time:
        type: string
      file_id:
        type: integer
      folder_id:
        type: integer
      max_downloads:
        type: integer
      type:
        $ref: '#/definitions/model.PickUpTargetType'
    type: object
  dto.CreatePublicShareLinkReq:
    properties:
      file_id:
        minimum: 1
        type: integer
    required:
    - file_id
    type: object
  dto.DashboardFileStatItem:
    properties:
      count:
        type: integer
      size:
        type: integer
      type:
        type: string
    type: object
  dto.DashboardOverviewResp:
    properties:
      file_stats:
        items:
          $ref: '#/definitions/dto.DashboardFileStatItem'
        type: array
      recent_activities:
        items:
          $ref: '#/definitions/dto.DashboardRecentActivityItem'
        type: array
      storage_left:
        type: integer
      storage_total:
        type: integer
      storage_used:
        type: integer
      storage_used_percent:
        type: integer
    type: object
  dto.DashboardRecentActivityItem:
    properties:
      file_type:
        type: string
      folder_name:
        type: string
      id:
        type: integer
      name:
        type: string
      size:
        type: integer
      updated_at:
        type: string
    type: object
  dto.DeleteFileReq:
    properties:
      file_id:
        minimum: 1
        type: integer
      folder_id:
        minimum: 1
        type: integer
    type: object
  dto.FileListItem:
    properties:
      file_type:
        type: string
      id:
        type: integer
      name:
        type: string
      size:
        type: integer
      type:
        description: file / folder
        type: string
      updated_at:
        type: string
    type: object
  dto.InitUploadFileReq:
    properties:
      chunk_size:
        minimum: 1
        type: integer
      file_hash:
        type: string
      file_name:
        type: string
      file_size:
        minimum: 1
        type: integer
      file_type:
        type: string
      folder_id:
        type: integer
      total_chunks:
        minimum: 1
        type: integer
    required:
    - chunk_size
    - file_hash
    - file_name
    - file_size
    - file_type
    - total_chunks
    type: object
  dto.LoginReq:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  dto.MakeDirectoryReq:
    properties:
      folder_id:
        type: integer
      name:
        type: string
    type: object
  dto.MergeUploadedChunksReq:
    properties:
      task_id:
        minimum: 1
        type: integer
    required:
    - task_id
    type: object
  dto.MoveFileReq:
    properties:
      file_id:
        minimum: 1
        type: integer
      folder_id:
        minimum: 1
        type: integer
      target_folder_id:
        type: integer
    type: object
  dto.RegisterUserReq:
    properties:
      email:
        type: string
      password:
        type: string
      username:
        type: string
    type: object
  dto.RenameFileReq:
    properties:
      file_id:
        minimum: 1
        type: integer
      folder_id:
        minimum: 1
        type: integer
      name:
        type: string
    required:
    - name
    type: object
  model.PickUpCodeStatus:
    enum:
    - Active
    - Expired
    type: string
    x-enum-varnames:
    - PickUpCodeStatusActive
    - PickUpCodeStatusExpire
  model.PickUpTargetType:
    enum:
    - file
    - folder
    type: string
    x-enum-varnames:
    - PickUpTargetTypeFile
    - PickUpTargetTypeFolder
  model.UploadStatus:
    enum:
    - uploading
    - completed
    type: string
    x-enum-varnames:
    - UploadStatusUploading
    - UploadStatusCompleted
  response.Response:
    properties:
      code:
        $ref: '#/definitions/response.ResponseCode'
      data: {}
      msg:
        type: string
    type: object
  response.ResponseCode:
    enum:
    - 0
    - 1001
    - 1002
    - 1003
    - 1004
    type: integer
    x-enum-varnames:
    - CodeSuccess
    - CodeInvalidParam
    - CodeUnauthorized
    - CodeNotFound
    - CodeServerError
  vo.InitUploadFileResp:
    properties:
      status:
        $ref: '#/definitions/model.UploadStatus'
      task_id:
        type: integer
      uploaded_chunks:
        items:
          type: integer
        type: array
    type: object
  vo.LoginResp:
    properties:
      token:
        type: string
    type: object
  vo.PickUpCodeListItem:
    properties:
      code:
        type: string
      created_at:
        type: string
      download:
        type: integer
      expire_time:
        type: string
      file_id:
        type: integer
      folder_id:
        type: integer
      id:
        type: integer
      max_download:
        type: integer
      name:
        type: string
      status:
        $ref: '#/definitions/model.PickUpCodeStatus'
      type:
        $ref: '#/definitions/model.PickUpTargetType'
    type: object
info:
  contact: {}
paths:
  /auth/check:
    get:
      consumes:
      - application/json
      description: 验证用户是否已登录（通过JWT Token）
      produces:
      - application/json
      responses:
        "200":
          description: 已登录（code=0）
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  type: object
              type: object
        "401":
          description: 未登录（code=1002）
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - ApiKeyAuth: []
      summary: 检查登录状态
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: 用户通过账号密码登录
      parameters:
      - description: 登录参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/dto.LoginReq'
      produces:
      - application/json
      responses:
        "200":
          description: 返回统一响应（code=0成功，code!=0失败；data包含token）
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/vo.LoginResp'
              type: object
      summary: 用户登录
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: 用户通过用户名、邮箱、密码注册
      parameters:
      - description: 注册参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterUserReq'
      produces:
      - application/json
      responses:
        "200":
          description: 返回统一响应（code=0成功，code!=0失败；data可能为空）
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  type: object
              type: object
      summary: 用户注册
      tags:
      - auth
  /file/chunk:
    post:
      consumes:
      - application/json
      description: 上传文件分片
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回（code=0）
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未授权（缺少/无效 Authorization）
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: 上传文件分片
      tags:
      - file
  /file/code:
    delete:
      consumes:
      - application/json
      description: 删除指定的取件码
      parameters:
      - description: 取件码ID
        in: query
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回（code=0）
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未授权（缺少/无效 Authorization）
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 权限不足
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 取件码不存在
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: 删除取件码
      tags:
      - file
    post:
      consumes:
      - application/json
      description: 创建分享码
      parameters:
      - description: 分享码参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/dto.CreatePickUpCodeReq'
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回（code=0,data=int）
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  type: integer
              type: object
        "401":
          description: 未授权（缺少/无效 Authorization）
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: 创建分享码
      tags:
      - file
  /file/code/count:
    get:
      consumes:
      - application/json
      description: 获取当前用户的取件码总数
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回（code=0,data=总数）
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  format: int64
                  type: integer
              type: object
        "401":
          description: 未授权（缺少/无效 Authorization）
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: 获取取件码总数
      tags:
      - file
  /file/code/list:
    get:
      consumes:
      - application/json
      description: 分页获取当前用户的所有取件码列表
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        required: true
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: page_size
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回（code=0,data=取件码列表）
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/vo.PickUpCodeListItem'
                  type: array
              type: object
        "401":
          description: 未授权（缺少/无效 Authorization）
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: 获取取件码列表
      tags:
      - file
  /file/dashboard/overview:
    get:
      consumes:
      - application/json
      description: 获取当前用户的空间使用、文件类型统计、最近活动
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回（code=0,data=dto.DashboardOverviewResp）
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.DashboardOverviewResp'
              type: object
        "401":
          description: 未授权（缺少/无效 Authorization）
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: 获取仪表盘概览数据
      tags:
      - file
  /file/delete:
    post:
      consumes:
      - application/json
      description: 通过 file_id 或 folder_id 删除对象（两者必须且只能传一个）
      parameters:
      - description: 删除参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/dto.DeleteFileReq'
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回（code=0）
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未授权（缺少/无效 Authorization）
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: 删除文件或文件夹
      tags:
      - file
  /file/download:
    get:
      consumes:
      - application/json
      description: 通过 file_id 下载单文件，或通过 folder_id 下载文件夹（zip）
      parameters:
      - description: 文件ID
        in: query
        name: file_id
        type: integer
      - description: 文件夹ID
        in: query
        name: folder_id
        type: integer
      produces:
      - application/octet-stream
      responses:
        "401":
          description: 未授权（缺少/无效 Authorization）
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: 下载文件或文件夹
      tags:
      - file
  /file/init:
    post:
      consumes:
      - application/json
      description: 初始化文件分片上传任务，返回已上传分片列表（同hash任务会复用）
      parameters:
      - description: 初始化上传参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/dto.InitUploadFileReq'
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回（code=0,data=vo.InitUploadFileResp）
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/vo.InitUploadFileResp'
              type: object
        "401":
          description: 未授权（缺少/无效 Authorization）
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: 初始化文件分片上传
      tags:
      - file
  /file/list:
    get:
      consumes:
      - application/json
      description: 获取文件夹下的文件列表
      parameters:
      - description: 文件夹ID
        in: query
        name: folder_id
        required: true
        type: integer
      - description: 页码
        in: query
        name: page
        required: true
        type: integer
      - description: 每页数量
        in: query
        name: page_size
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回（code=0,data=[]dto.FileListItem）
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.FileListItem'
                  type: array
              type: object
        "401":
          description: 未授权（缺少/无效 Authorization）
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: 获取文件夹下的文件列表
      tags:
      - file
  /file/list/count:
    get:
      consumes:
      - application/json
      description: 获取文件夹下的文件数量
      parameters:
      - description: 文件夹ID
        in: query
        name: folder_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回（code=0,data=int64）
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  format: int64
                  type: integer
              type: object
        "401":
          description: 未授权（缺少/无效 Authorization）
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: 获取文件夹下的文件数量
      tags:
      - file
  /file/merge:
    post:
      consumes:
      - application/json
      description: 合并上传的文件分片
      parameters:
      - description: 合并上传参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/dto.MergeUploadedChunksReq'
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回（code=0）
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未授权（缺少/无效 Authorization）
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: 合并上传的文件分片
      tags:
      - file
  /file/mkdir:
    post:
      consumes:
      - application/json
      description: 在指定文件夹下创建新文件夹
      parameters:
      - description: 创建文件夹参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/dto.MakeDirectoryReq'
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回（code=0,data=文件夹ID）
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  type: integer
              type: object
        "401":
          description: 未授权（缺少/无效 Authorization）
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: 创建文件夹
      tags:
      - file
  /file/move:
    post:
      consumes:
      - application/json
      description: 通过 file_id 或 folder_id 指定要移动的对象，target_folder_id 指定目标目录（0 表示根目录）
      parameters:
      - description: 移动参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/dto.MoveFileReq'
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回（code=0）
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未授权（缺少/无效 Authorization）
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: 移动文件或文件夹
      tags:
      - file
  /file/pickup/download:
    get:
      consumes:
      - application/json
      description: 通过取件码下载文件或文件夹（无需登录）
      parameters:
      - description: 取件码（6位字母数字组合）
        in: query
        name: code
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: 文件内容流
          schema:
            type: file
        "400":
          description: 取件码格式错误
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 取件码已失效或资源不存在
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 通过取件码下载文件
      tags:
      - file
  /file/preview:
    get:
      consumes:
      - application/json
      description: 通过文件ID预览文件内容（内联显示）
      parameters:
      - description: 文件ID
        in: query
        name: file_id
        required: true
        type: integer
      produces:
      - application/octet-stream
      responses:
        "200":
          description: 文件内容流
          schema:
            type: file
        "401":
          description: 未授权（缺少/无效 Authorization）
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 权限不足
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 文件不存在
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: 预览文件
      tags:
      - file
  /file/rename:
    post:
      consumes:
      - application/json
      description: 通过 file_id 或 folder_id 重命名（两者必须且只能传一个）
      parameters:
      - description: 重命名参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/dto.RenameFileReq'
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回（code=0）
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未授权（缺少/无效 Authorization）
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: 重命名文件或文件夹
      tags:
      - file
  /file/share/link:
    delete:
      consumes:
      - application/json
      description: 删除文件的公开分享链接
      parameters:
      - description: 文件ID
        in: query
        name: file_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回（code=0）
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未授权（缺少/无效 Authorization）
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 权限不足
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 分享链接不存在或文件不存在
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: 删除公开分享链接
      tags:
      - file
    get:
      consumes:
      - application/json
      description: 获取文件的公开分享链接信息
      parameters:
      - description: 文件ID
        in: query
        name: file_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回（code=0,data包含exists、token、url）
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  additionalProperties: true
                  type: object
              type: object
        "401":
          description: 未授权（缺少/无效 Authorization）
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 权限不足
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 文件不存在
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: 获取公开分享链接
      tags:
      - file
    post:
      consumes:
      - application/json
      description: 为文件创建公开分享链接，生成分享token
      parameters:
      - description: 创建分享参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/dto.CreatePublicShareLinkReq'
      produces:
      - application/json
